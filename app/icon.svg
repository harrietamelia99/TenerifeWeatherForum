<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="bgGrad" cx="45%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#c8e4f5"/>
      <stop offset="100%" stop-color="#8fc4dd"/>
    </radialGradient>
    <radialGradient id="sunGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#f9df8e"/>
      <stop offset="50%"  stop-color="#f6c159"/>
      <stop offset="100%" stop-color="#f5a62a"/>
    </radialGradient>
  </defs>

  <!-- Sky background -->
  <circle cx="50" cy="50" r="50" fill="url(#bgGrad)"/>

  <!-- Sun (sits behind the mountains) -->
  <circle cx="62" cy="57" r="20" fill="url(#sunGrad)"/>

  <!-- Left mountain (taller) -->
  <polygon points="6,84 36,24 66,84" fill="#05425a"/>
  <!-- Right mountain (shorter) -->
  <polygon points="34,84 57,39 80,84" fill="#0b445d"/>

  <!-- Subtle peak highlights -->
  <polygon points="33,31 36,24 39,31" fill="rgba(255,255,255,0.18)"/>
  <polygon points="54,46 57,39 60,46" fill="rgba(255,255,255,0.12)"/>
</svg>
